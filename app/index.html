            setup() {
                const isLoggedIn = ref(false)
                const loadingLogin = ref(false)
                const showReceipt = ref(false)
                const searchQuery = ref('')
                const cart = ref([])
                
                const db = [
                    { id: 1, name: 'Paracetamol 500mg Form', type: 'Box Structure (100 Tabs)', batch: 'BCH-2024-X1', stock: 1200, price: 7.00, expiring: false },
                    { id: 2, name: 'Amoxicillin Capsule Generic Builder Block 250mg', type: 'Bottle Layout', batch: 'BCH-2025-A2', stock: 45, price: 25.50, expiring: true },
                    { id: 3, name: 'Advil Ibuprofen 400mg Pipeline Target', type: 'Box Form (50)', batch: 'BCH-2027-B9', stock: 850, price: 12.00, expiring: false },
                    { id: 4, name: 'Medical Cough Suppressant Formula (Generic Block)', type: 'Liquid Component 200ml', batch: 'BCH-2024-Z8', stock: 12, price: 9.50, expiring: true }
                ]

                const filteredDb = computed(() => {
                    if (!searchQuery.value) return []
                    const lower = searchQuery.value.toLowerCase()
                    return db.filter(p => p.name.toLowerCase().includes(lower) || p.batch.toLowerCase().includes(lower))
                })

                const subtotal = computed(() => cart.value.reduce((sum, item) => sum + (item.price * item.qty), 0))
                const tax = computed(() => subtotal.value * 0.085)
                const totalDue = computed(() => subtotal.value + tax.value)

                const login = () => {
                    loadingLogin.value = true
                    setTimeout(() => {
                        isLoggedIn.value = true
                        loadingLogin.value = false
                    }, 1200)
                }

                const logout = () => {
                    isLoggedIn.value = false
                    cart.value = []
                    searchQuery.value = ''
                    showReceipt.value = false
                }

                const addToCart = (product) => {
                    const existing = cart.value.find(i => i.id === product.id)
                    if (existing) {
                        existing.qty++
                    } else {
                        cart.value.push({ ...product, qty: 1 })
                    }
                    searchQuery.value = ''
                }
                
                const scanItem = () => {
                    if (filteredDb.value.length > 0) {
                        addToCart(filteredDb.value[0])
                    } else if (searchQuery.value.length > 0) {
                        alert("No local array objects mapped securely matching query.");
                    }
                }

                const updateQty = (item, amt) => {
                    item.qty += amt
                    if (item.qty <= 0) {
                        cart.value = cart.value.filter(i => i.id !== item.id)
                    }
                }

                const checkout = () => {
                    showReceipt.value = true
                }
                
                const closeReceipt = () => {
                    showReceipt.value = false
                    cart.value = []
                }

                return {
                    isLoggedIn, loadingLogin, login, logout,
                    searchQuery, filteredDb, scanItem,
                    cart, addToCart, updateQty,
                    subtotal, tax, totalDue,
                    showReceipt, checkout, closeReceipt
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
